<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>指導シフト調整</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#F4F7F6; --panel:#FFFFFF; --ink:#182A32; --ink-soft:#5B6E74;
  --navy:#1F4E5F; --navy-dark:#122F39; --teal:#33907B; --teal-soft:#E4F1EC;
  --amber:#DD9F35; --amber-soft:#FBF0DC; --coral:#D1543D; --coral-soft:#FBE7E2;
  --line:#DEE6E4; --radius:16px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg); color:var(--ink); font-family:'Noto Sans JP',sans-serif; -webkit-tap-highlight-color:transparent;}
h1,h2,h3,h4{font-family:'Zen Kaku Gothic New',sans-serif;}
#app{max-width:920px;margin:0 auto;padding:0 0 60px;}

.topbar{background:linear-gradient(155deg,var(--navy) 0%,var(--navy-dark) 100%); color:#fff; padding:16px 16px 12px; border-radius:0 0 22px 22px; position:sticky; top:0; z-index:5;}
.toprow{display:flex; align-items:center; justify-content:space-between; gap:8px;}
.eyebrow{font-size:11px; letter-spacing:.14em; opacity:.72; font-weight:600;}
.topbar h1{font-size:19px; margin:2px 0 10px; font-weight:900;}
.role-btn{border:none; background:rgba(255,255,255,.16); color:#fff; border-radius:20px; padding:6px 12px; font-size:11.5px; font-weight:700; cursor:pointer; white-space:nowrap;}
.tabs{display:flex; gap:6px; margin-top:10px;}
.tab{flex:1; text-align:center; padding:9px 4px; border-radius:10px; font-size:13px; font-weight:700; background:rgba(255,255,255,.10); color:#fff; border:none; cursor:pointer;}
.tab.active{background:#fff; color:var(--navy-dark);}
.icon-btn{border:none; background:rgba(255,255,255,.14); color:#fff; border-radius:10px; padding:9px 10px; font-size:12.5px; font-weight:700; cursor:pointer; white-space:nowrap;}

.sport-row{display:flex; gap:8px; padding:12px 16px 0;}
.sport-btn{flex:1; border:none; background:var(--panel); color:var(--ink-soft); border-radius:12px; padding:10px 8px; font-size:13.5px; font-weight:800; cursor:pointer; box-shadow:0 1px 5px rgba(18,47,57,.06);}
.sport-btn.active{background:var(--navy); color:#fff;}
.club-row{display:flex; gap:8px; overflow-x:auto; padding:10px 16px 2px;}
.club-chip{flex-shrink:0; border:1.5px solid var(--line); background:var(--panel); color:var(--ink); border-radius:20px; padding:8px 14px; font-size:12.5px; font-weight:700; cursor:pointer; white-space:nowrap;}
.club-chip.active{background:var(--navy); border-color:var(--navy); color:#fff;}
.compare-link{display:block; text-align:center; font-size:11.5px; font-weight:700; color:var(--navy); padding:6px 16px 0; cursor:pointer; text-decoration:underline;}

.board-wrap{padding:12px 16px 0; display:flex; flex-direction:column; gap:8px;}
.board-post{border-radius:14px; padding:12px 14px; position:relative; overflow:hidden;}
.board-post.excerpt-collapsed{max-height:78px;}
.board-post .btext{font-size:13.5px; font-weight:700; white-space:pre-wrap; line-height:1.55;}
.board-post .fade{position:absolute; left:0; right:0; bottom:0; height:34px; background:linear-gradient(to bottom, transparent, var(--board-bg, #fff));}
.board-more{display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:800; margin-top:6px; cursor:pointer; opacity:.85;}
.board-admin-btns{position:absolute; top:8px; right:8px; display:flex; gap:4px;}

.today-strip{margin:14px 16px 0; background:var(--panel); border-radius:var(--radius); padding:14px 16px; box-shadow:0 2px 10px rgba(18,47,57,.06);}
.today-strip .lbl{font-size:11px; color:var(--ink-soft); font-weight:700;}
.today-strip .date{font-size:16px; font-weight:900; margin:2px 0 8px;}
.mine-badge{display:inline-block; background:var(--teal-soft); color:var(--teal); font-size:11px; font-weight:800; padding:2px 9px; border-radius:20px; margin-left:6px;}
.empty-note{color:var(--ink-soft); font-size:12.5px; padding:4px 0;}
.short-badge{display:inline-block; background:var(--coral-soft); color:var(--coral); font-size:10.5px; font-weight:800; padding:2px 8px; border-radius:20px; margin-left:6px;}

.legend{display:flex; gap:14px; flex-wrap:wrap; padding:10px 20px 0; font-size:10.5px; color:var(--ink-soft); font-weight:600;}
.legend span{display:inline-flex; align-items:center; gap:5px;}
.dot{width:8px; height:8px; border-radius:50%; display:inline-block;}
.dot.confirmed{background:var(--teal);}
.dot.open{background:var(--amber);}
.dot.short{background:var(--coral);}

.month-nav{display:flex; align-items:center; justify-content:space-between; padding:14px 16px 6px;}
.month-nav .mtitle{font-size:16px; font-weight:900;}
.nav-btn{border:none; background:var(--panel); width:34px; height:34px; border-radius:50%; font-size:16px; font-weight:800; cursor:pointer; box-shadow:0 1px 5px rgba(18,47,57,.08); color:var(--navy);}
.exp-btn{border:none; background:var(--panel); border-radius:20px; padding:8px 13px; font-size:11.5px; font-weight:800; color:var(--navy); cursor:pointer; box-shadow:0 1px 5px rgba(18,47,57,.08);}
.weekdays{display:grid; grid-template-columns:repeat(7,1fr); padding:2px 16px; font-size:11px; color:var(--ink-soft); font-weight:700; text-align:center;}
.grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; padding:4px 12px 16px;}
.daycell{background:var(--panel); border-radius:10px; min-height:70px; padding:5px 4px; cursor:pointer; border:1px solid var(--line); display:flex; flex-direction:column; gap:2px;}
.daycell.empty{background:transparent; border:none; cursor:default;}
.daycell:active{transform:scale(.96);}
.daycell.today{border:2px solid var(--navy);}
.daynum{font-size:11.5px; font-weight:800; color:var(--ink-soft);}
.daycell.today .daynum{color:var(--navy);}
.mini-pill{font-size:9px; font-weight:700; padding:2px 4px; border-radius:5px; color:#fff; line-height:1.25; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;}

.year-nav{display:flex; align-items:center; justify-content:space-between; padding:14px 16px 4px;}
.year-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:8px 12px 16px;}
@media(min-width:640px){.year-grid{grid-template-columns:repeat(3,1fr);}}
.ymonth{background:var(--panel); border-radius:12px; padding:10px; box-shadow:0 1px 6px rgba(18,47,57,.06);}
.ymonth h4{margin:0 0 6px; font-size:12.5px; font-weight:800; cursor:pointer;}
.ygrid{display:grid; grid-template-columns:repeat(7,1fr); gap:2px;}
.ycell{aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:8.5px; color:var(--ink-soft); border-radius:3px; position:relative;}
.ycell .ydots{position:absolute; bottom:1px; display:flex; gap:1px;}
.ycell .ydots span{width:3px; height:3px; border-radius:50%;}

.overlay{position:fixed; inset:0; background:rgba(18,47,57,.42); z-index:20; display:flex; align-items:flex-end; justify-content:center;}
.overlay.hidden{display:none;}
.sheet{background:var(--bg); width:100%; max-width:560px; border-radius:20px 20px 0 0; max-height:88vh; overflow-y:auto; padding:16px 16px 26px;}
.sheet-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
.sheet-head h2{font-size:16px; margin:0; font-weight:900;}
.sheet-head .sub{font-size:11.5px; color:var(--ink-soft); font-weight:700; margin-top:2px;}
.close-x{border:none; background:var(--line); width:30px; height:30px; border-radius:50%; font-size:15px; cursor:pointer; color:var(--ink-soft); flex-shrink:0;}

.event-card{background:var(--panel); border-radius:14px; padding:14px 16px 16px; margin-bottom:14px; box-shadow:0 1px 6px rgba(18,47,57,.05); border-left:7px solid var(--ev-color,var(--navy));}
.ev-num{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:900; color:#fff; background:var(--ev-color,var(--navy)); padding:3px 11px; border-radius:20px; margin-bottom:8px;}
.ev-top{display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:4px;}
.ev-time{font-size:19px; color:var(--ink); font-weight:800; margin:2px 0 8px; letter-spacing:.01em;}
.ev-note{font-size:13px; color:var(--ink-soft); margin-bottom:8px;}
.badge{font-size:12px; font-weight:800; padding:4px 11px; border-radius:20px; white-space:nowrap;}
.badge.open{background:var(--amber-soft); color:var(--amber);}
.badge.confirmed{background:var(--teal-soft); color:var(--teal);}
.ev-admin-btns{display:flex; gap:4px;}
.icon-sm{border:none; background:var(--line); border-radius:7px; width:30px; height:30px; font-size:14px; cursor:pointer; color:var(--ink-soft);}
.warn{background:var(--coral-soft); color:var(--coral); font-size:12.5px; font-weight:700; padding:8px 10px; border-radius:8px; margin-bottom:9px;}
.warn .sugg{display:flex; flex-wrap:wrap; gap:6px; margin-top:6px;}
.sugg-chip{background:#fff; border:1.5px solid var(--coral); color:var(--coral); border-radius:20px; padding:4px 10px; font-size:11.5px; font-weight:700; cursor:pointer;}

body.scale-large .ev-time{font-size:22px;}
body.scale-large .resp-chip{font-size:13.5px; padding:6px 13px;}
body.scale-large .btn{font-size:14px; padding:10px 15px;}
body.scale-xl .ev-time{font-size:26px;}
body.scale-xl .resp-chip{font-size:15px; padding:7px 14px;}
body.scale-xl .btn{font-size:15.5px; padding:12px 16px;}
body.scale-xl .sec-label{font-size:13px;}
.size-choice{display:flex; gap:6px; margin-bottom:14px;}
.size-choice button{flex:1;}
.size-choice button.active{background:var(--navy); color:#fff; border-color:var(--navy);}
.color-swatches{display:flex; gap:8px; flex-wrap:wrap; margin:4px 0 8px;}
.swatch{width:28px; height:28px; border-radius:50%; border:2px solid transparent; cursor:pointer;}
.swatch.active{border-color:var(--ink); box-shadow:0 0 0 2px #fff inset;}
.align-choice,.mode-choice{display:flex; gap:6px; margin-bottom:8px;}
.align-choice button,.mode-choice button{flex:1;}
.align-choice button.active,.mode-choice button.active{background:var(--navy); color:#fff; border-color:var(--navy);}

.sec-label{font-size:11px; font-weight:800; color:var(--ink-soft); margin:8px 0 5px;}
.resp-row{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px;}
.resp-chip{border-radius:20px; padding:6px 13px; font-size:13.5px; font-weight:700; display:inline-flex; align-items:center; gap:6px; border:1.5px solid var(--line); background:#fff; color:var(--ink);}
.resp-chip.mine{border-color:var(--teal); background:var(--teal-soft); color:var(--teal);}
.resp-chip.confirmed-pick{background:var(--teal); color:#fff; border-color:var(--teal);}
.resp-chip button{border:none; background:none; color:inherit; font-size:13px; cursor:pointer; padding:0; line-height:1;}
.btn{border:none; border-radius:10px; padding:9px 14px; font-size:13.5px; font-weight:800; cursor:pointer;}
.btn.primary{background:var(--teal); color:#fff;}
.btn.ghost{background:var(--line); color:var(--ink);}
.btn.outline{background:#fff; border:1.5px solid var(--navy); color:var(--navy);}
.btn.warnbtn{background:var(--coral-soft); color:var(--coral);}
.btn.block{width:100%; text-align:center;}
.row-gap{display:flex; gap:8px; flex-wrap:wrap;}
select,input[type=text],input[type=time],input[type=date],textarea{font-family:inherit; font-size:13px; padding:8px 10px; border-radius:8px; border:1.5px solid var(--line); background:#fff; color:var(--ink); width:100%;}
textarea{resize:vertical; min-height:70px;}
.field{margin-bottom:8px;}
.field label{font-size:11.5px; font-weight:700; color:var(--ink-soft); display:block; margin-bottom:4px;}
.two-col{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.new-ev-form{background:var(--panel); border-radius:14px; padding:12px 14px; margin-top:6px; box-shadow:0 1px 6px rgba(18,47,57,.05);}
.check-row{display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; color:var(--ink-soft); margin:6px 0;}
.divider{border-top:1px dashed var(--line); margin:10px 0;}

.staff-row{display:flex; align-items:center; gap:8px; background:var(--panel); border-radius:12px; padding:9px 10px; margin-bottom:7px; flex-wrap:wrap;}
.staff-row .cdot{width:12px; height:12px; border-radius:50%; flex-shrink:0;}
.staff-row .nm{flex:1; font-size:13px; font-weight:700;}
.small-btn{border:none; background:var(--line); border-radius:7px; padding:5px 9px; font-size:11px; font-weight:700; cursor:pointer; color:var(--ink-soft);}
.small-btn.danger{background:var(--coral-soft); color:var(--coral);}
.inline-form{display:flex; gap:6px; margin-top:4px;}
.club-check-panel{width:100%; background:var(--bg); border-radius:10px; padding:8px 10px; margin-top:4px;}
.club-check-row{display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:3px 0;}
.sport-group-label{font-size:10.5px; font-weight:800; color:var(--ink-soft); margin:6px 0 2px;}

.identity-card{background:var(--panel); border-radius:16px; padding:16px; text-align:center;}
.role-choice{display:block; width:100%; border:none; background:var(--navy); color:#fff; border-radius:12px; padding:14px; font-size:14.5px; font-weight:800; margin-bottom:10px; cursor:pointer;}

.export-menu{display:flex; flex-direction:column; gap:8px;}
.export-menu button{text-align:left;}

.compare-card{background:var(--panel); border-radius:14px; padding:12px 14px; margin-bottom:10px; box-shadow:0 1px 6px rgba(18,47,57,.05);}
.compare-card h4{margin:0 0 6px; font-size:13.5px; font-weight:800;}
.compare-stats{display:flex; gap:8px; font-size:11.5px; font-weight:700;}
.compare-stats span{padding:3px 9px; border-radius:20px;}
.compare-upcoming{margin-top:8px; font-size:12px; color:var(--ink-soft);}
.compare-upcoming div{padding:3px 0; display:flex; align-items:center; gap:6px;}

.toast{position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--navy-dark); color:#fff; padding:9px 16px; border-radius:20px; font-size:12.5px; font-weight:700; z-index:60; opacity:0; transition:.25s; pointer-events:none;}
.toast.show{opacity:1;}
.loading-screen{display:flex; flex-direction:column; align-items:center; justify-content:center; height:70vh; color:var(--ink-soft); gap:10px;}
.spin{width:26px; height:26px; border:3px solid var(--line); border-top-color:var(--navy); border-radius:50%; animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.hidden{display:none !important;}
.shared-note{font-size:10.5px; color:var(--ink-soft); text-align:center; padding:10px 20px 0;}

#printArea{display:none;}
@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{display:block; position:absolute; top:0; left:0; width:100%; padding:20px;}
  #printArea table{width:100%; border-collapse:collapse; font-size:11pt;}
  #printArea th, #printArea td{border:1px solid #999; padding:5px 8px; text-align:left;}
}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="toprow">
      <div>
        <div class="eyebrow">指導シフト調整</div>
        <h1 style="margin-bottom:0;">シフト調整</h1>
      </div>
      <button class="role-btn" id="roleBtn">あなた: 未設定</button>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="month">月間</button>
      <button class="tab" data-tab="year">年間</button>
      <button class="icon-btn" id="openStaffBtn">設定</button>
    </div>
  </div>

  <div id="loading" class="loading-screen"><div class="spin"></div><div>読み込み中…</div></div>

  <div id="mainContent" class="hidden">
    <div class="board-wrap" id="boardWrap"></div>

    <div class="sport-row" id="sportRow"></div>
    <div class="club-row" id="clubRow"></div>
    <div class="compare-link" id="compareLink">同じ種目のクラブ状況を比較する ▾</div>

    <div class="today-strip" id="todayStrip"></div>
    <div class="legend">
      <span><span class="dot open"></span>候補（未確定）</span>
      <span><span class="dot confirmed"></span>確定</span>
      <span><span class="dot short"></span>人数不足</span>
    </div>

    <div id="monthView">
      <div class="month-nav">
        <button class="nav-btn" id="prevMonth">‹</button>
        <div class="mtitle" id="monthTitle"></div>
        <button class="nav-btn" id="nextMonth">›</button>
      </div>
      <div style="padding:0 16px;"><button class="exp-btn" id="exportBtn">📄 このクラブの月間予定を出力</button></div>
      <div class="weekdays"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div>
      <div class="grid" id="monthGrid"></div>
    </div>

    <div id="yearView" class="hidden">
      <div class="year-nav">
        <button class="nav-btn" id="prevYear">‹</button>
        <div class="mtitle" id="yearTitle"></div>
        <button class="nav-btn" id="nextYear">›</button>
      </div>
      <div class="year-grid" id="yearGrid"></div>
    </div>

    <div class="shared-note">※内容はスタッフ全員にリアルタイムで共有されます（数秒ごとに自動更新）</div>
  </div>
</div>

<div id="printArea"></div>

<!-- Day modal -->
<div class="overlay hidden" id="dayModal">
  <div class="sheet">
    <div class="sheet-head">
      <div><h2 id="dayModalTitle"></h2><div class="sub" id="dayModalSub"></div></div>
      <button class="close-x" data-close="dayModal">×</button>
    </div>
    <div id="dayModalBody"></div>
    <div id="newEventArea"></div>
  </div>
</div>

<!-- Staff / settings modal -->
<div class="overlay hidden" id="staffModal">
  <div class="sheet">
    <div class="sheet-head"><h2>設定</h2><button class="close-x" data-close="staffModal">×</button></div>
    <div id="displaySettingsArea"></div>
    <div class="sec-label" style="margin-top:14px;">スタッフ・対応クラブ</div>
    <div id="staffList"></div>
    <div class="inline-form">
      <input type="text" id="newStaffName" placeholder="名前を入力">
      <button class="btn primary" id="addStaffBtn">追加</button>
    </div>
  </div>
</div>

<!-- Identity modal -->
<div class="overlay hidden" id="identityModal">
  <div class="sheet">
    <div class="sheet-head"><h2>あなたは？</h2><button class="close-x" data-close="identityModal">×</button></div>
    <div class="identity-card">
      <button class="role-choice" id="showAdminPw">管理者として使う</button>
      <div id="adminPwArea" class="hidden" style="margin-bottom:12px;">
        <div class="field" style="text-align:left;"><label>管理者パスワード</label><input type="text" id="adminPwInput" placeholder="パスワードを入力"></div>
        <button class="btn primary block" id="pickAdmin">これで進む</button>
      </div>
      <div class="divider"></div>
      <div style="font-size:12px; color:var(--ink-soft); font-weight:700; margin-bottom:8px;">指導者として使う場合、あなたの名前を選んでください</div>
      <div id="instructorPickList" style="margin-bottom:10px;"></div>
      <div class="inline-form">
        <input type="text" id="quickAddName" placeholder="名前が無ければ入力して追加">
        <button class="btn outline" id="quickAddBtn">追加して選択</button>
      </div>
    </div>
  </div>
</div>

<!-- Export modal -->
<div class="overlay hidden" id="exportModal">
  <div class="sheet">
    <div class="sheet-head"><h2>月間予定を出力</h2><button class="close-x" data-close="exportModal">×</button></div>
    <div style="font-size:12px; color:var(--ink-soft); margin-bottom:10px;">表示中のクラブ・月で「確定」した予定のみを出力します。</div>
    <div class="export-menu">
      <button class="btn outline block" id="expExcel">📊 エクセルで出力（.xlsx）</button>
      <button class="btn outline block" id="expWord">📝 ワードで出力（.doc）</button>
      <button class="btn outline block" id="expPdf">🖨 PDFで出力（印刷画面から保存）</button>
    </div>
  </div>
</div>

<!-- Compare modal -->
<div class="overlay hidden" id="compareModal">
  <div class="sheet">
    <div class="sheet-head"><h2 id="compareTitle">クラブ比較</h2><button class="close-x" data-close="compareModal">×</button></div>
    <div id="compareBody"></div>
  </div>
</div>

<!-- Board edit modal -->
<div class="overlay hidden" id="boardEditModal">
  <div class="sheet">
    <div class="sheet-head"><h2 id="boardEditTitle">掲示板に投稿</h2><button class="close-x" data-close="boardEditModal">×</button></div>
    <div class="field"><label>内容</label><textarea id="boardText" placeholder="お知らせを入力してください"></textarea></div>
    <div class="field"><label>文字色</label><div class="color-swatches" id="boardColorRow"></div></div>
    <div class="field"><label>位置</label>
      <div class="align-choice">
        <button class="btn outline" data-align="left">左</button>
        <button class="btn outline" data-align="center">中央</button>
        <button class="btn outline" data-align="right">右</button>
      </div>
    </div>
    <div class="field"><label>表示方法</label>
      <div class="mode-choice">
        <button class="btn outline" data-mode="full">全体を表示</button>
        <button class="btn outline" data-mode="excerpt">抜粋（一部だけ表示）</button>
      </div>
    </div>
    <button class="btn primary block" id="saveBoardBtn">投稿を保存する</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PALETTE = ['#1F4E5F','#33907B','#DD9F35','#8E5FB0','#3D7FBF','#C1553F','#4B8A6B','#B0784B'];
const SPORTS = [{id:'softtennis', name:'ソフトテニス'}, {id:'tabletennis', name:'卓球'}];
const DEFAULT_CLUBS = [
  {id:'club-nk-boys-st', name:'西ノ京中学校男子ソフトテニスクラブ', sport:'softtennis', requiredCount:2},
  {id:'club-nk-girls-st', name:'西ノ京中学校女子ソフトテニスクラブ', sport:'softtennis', requiredCount:2},
  {id:'club-kg-girls-st', name:'上京中学校女子ソフトテニスクラブ', sport:'softtennis', requiredCount:2},
  {id:'club-kg-tt', name:'上京中学校卓球クラブ', sport:'tabletennis', requiredCount:2},
  {id:'club-shugakuin-tt', name:'修学院中学校卓球クラブ', sport:'tabletennis', requiredCount:2},
  {id:'club-okazaki-konoe-tt', name:'岡崎中学校・近衛中学校（合同）卓球クラブ', sport:'tabletennis', requiredCount:2}
];
let config = {staff:[], clubs:[], display:{fontScale:'normal'}, board:[], templates:[]};
let events = [];
let responses = [];
let identity = null; // {role:'admin'|'instructor', staffId}
let currentSport = SPORTS[0].id;
let currentClubId = null;
let currentMonth = new Date().getMonth(), currentYear = new Date().getFullYear();
let yearViewYear = new Date().getFullYear();
let activeDayDate = null;
let pollTimer = null;
let dayClipboard = null; // {clubId, items:[...]}
let expandedBoardIds = new Set();
let editingBoardId = null;

const pad = n => String(n).padStart(2,'0');
const dstr = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
const todayStr = () => { const t=new Date(); return dstr(t.getFullYear(), t.getMonth(), t.getDate()); };
const esc = s => (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const wd = d => ['日','月','火','水','木','金','土'][d.getDay()];

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function isModalInputFocused(modalEl){
  const a = document.activeElement;
  return a && modalEl.contains(a) && ['INPUT','SELECT','TEXTAREA'].includes(a.tagName);
}

/* ---------- storage ---------- */
async function loadShared(){
  try{ const r = await window.storage.get('sch-config', true); config = r ? JSON.parse(r.value) : null; }
  catch(e){ config = null; }
  if(!config) config = {};
  if(!config.staff) config.staff = [];
  if(!config.clubs || config.clubs.length===0) config.clubs = JSON.parse(JSON.stringify(DEFAULT_CLUBS));
  if(!config.display) config.display = {fontScale:'normal'};
  if(!config.board) config.board = [];
  if(!config.templates) config.templates = [];
  applyDisplaySettings();
  try{ const r = await window.storage.get('sch-events', true); events = r ? JSON.parse(r.value) : []; }
  catch(e){ events = []; }
  try{ const r = await window.storage.get('sch-responses', true); responses = r ? JSON.parse(r.value) : []; }
  catch(e){ responses = []; }
}
async function saveConfig(){ try{ await window.storage.set('sch-config', JSON.stringify(config), true); }catch(e){ showToast('保存に失敗しました'); } }
async function saveEvents(){ try{ await window.storage.set('sch-events', JSON.stringify(events), true); }catch(e){ showToast('保存に失敗しました'); } }
async function saveResponses(){ try{ await window.storage.set('sch-responses', JSON.stringify(responses), true); }catch(e){ showToast('保存に失敗しました'); } }

async function loadIdentity(){
  try{ const r = await window.storage.get('my-identity', false); identity = r ? JSON.parse(r.value) : null; }
  catch(e){ identity = null; }
}
async function saveIdentity(){ try{ await window.storage.set('my-identity', JSON.stringify(identity), false); }catch(e){} }

/* ---------- helpers ---------- */
function staffById(id){ return config.staff.find(s=>s.id===id); }
function clubById(id){ return config.clubs.find(c=>c.id===id); }
function clubsBySport(sport){ return config.clubs.filter(c=>c.sport===sport); }
function isAdmin(){ return identity && identity.role==='admin'; }
function myStaffId(){ return identity && identity.role==='instructor' ? identity.staffId : null; }
function myStaff(){ const id = myStaffId(); return id ? staffById(id) : null; }
function myClubIds(){ const st = myStaff(); return st && st.clubIds ? st.clubIds : []; }
function eventsOnDateAllClubs(date){ return events.filter(e=>e.date===date); }
function eventsOnDateClub(date){ return events.filter(e=>e.date===date && e.clubId===currentClubId); }
function respsForEvent(evId){ return responses.filter(r=>r.eventId===evId); }
function myResponse(evId){ const sid = myStaffId(); return sid ? responses.find(r=>r.eventId===evId && r.staffId===sid) : null; }
function timeLabel(e){ return e.timeStart ? `${e.timeStart}〜${e.timeEnd||''}` : '時間未定（担当者ごとに登録）'; }
function requiredFor(clubId){ const c = clubById(clubId); return (c && c.requiredCount) || 2; }
function updateRoleBtn(){
  const btn = document.getElementById('roleBtn');
  if(!identity){ btn.textContent = 'あなた: 未設定'; return; }
  if(identity.role==='admin'){ btn.textContent = 'あなた: 管理者'; }
  else{ const st = staffById(identity.staffId); btn.textContent = 'あなた: ' + (st ? st.name : '指導者'); }
}
function ensureCurrentClub(){
  const list = clubsBySport(currentSport);
  if(!list.find(c=>c.id===currentClubId)) currentClubId = list.length ? list[0].id : null;
}
/* staff from sister clubs (same sport, different club) capable of helping */
function crossClubCandidates(clubId, excludeIds){
  const c = clubById(clubId); if(!c) return [];
  excludeIds = excludeIds || [];
  return config.staff.filter(s=>
    !(s.clubIds||[]).includes(clubId) &&
    (s.clubIds||[]).some(cid=>{ const cc = clubById(cid); return cc && cc.sport===c.sport; }) &&
    !excludeIds.includes(s.id)
  );
}

/* ---------- sport / club selectors ---------- */
function renderSportRow(){
  document.getElementById('sportRow').innerHTML = SPORTS.map(s=>
    `<button class="sport-btn ${s.id===currentSport?'active':''}" data-sport="${s.id}">${esc(s.name)}</button>`
  ).join('');
  document.querySelectorAll('#sportRow [data-sport]').forEach(b=> b.addEventListener('click', ()=>{
    currentSport = b.dataset.sport; ensureCurrentClub();
    renderSportRow(); renderClubRow(); renderMonth(); renderToday();
  }));
}
function renderClubRow(){
  ensureCurrentClub();
  const list = clubsBySport(currentSport);
  document.getElementById('clubRow').innerHTML = list.map(c=>
    `<button class="club-chip ${c.id===currentClubId?'active':''}" data-club="${c.id}">${esc(c.name)}</button>`
  ).join('') || '<div class="empty-note">クラブが登録されていません</div>';
  document.querySelectorAll('#clubRow [data-club]').forEach(b=> b.addEventListener('click', ()=>{
    currentClubId = b.dataset.club;
    renderClubRow(); renderMonth(); renderToday();
  }));
}

/* ---------- board ---------- */
function renderBoard(){
  const wrap = document.getElementById('boardWrap');
  const posts = (config.board||[]).slice().sort((a,b)=>b.createdAt-a.createdAt);
  let html = '';
  if(isAdmin()) html += `<button class="btn outline block" id="newBoardBtn">📌 掲示板に投稿する</button>`;
  posts.forEach(p=>{
    const collapsed = p.mode==='excerpt' && !expandedBoardIds.has(p.id);
    const bg = p.bg || '#FFF8E6';
    html += `<div class="board-post ${collapsed?'excerpt-collapsed':''}" style="--board-bg:${bg}; background:${bg}; text-align:${p.align||'left'};">
      ${isAdmin() ? `<div class="board-admin-btns">
        <button class="icon-sm" data-bact="edit" data-bid="${p.id}">✎</button>
        <button class="icon-sm" data-bact="del" data-bid="${p.id}">🗑</button>
      </div>` : ''}
      <div class="btext" style="color:${p.color||'#182A32'};">${esc(p.text)}</div>
      ${collapsed ? `<div class="fade"></div>` : ''}
      ${p.mode==='excerpt' ? `<div class="board-more" style="color:${p.color||'#182A32'};" data-bact="toggle" data-bid="${p.id}">${collapsed?'続きを読む ▾':'閉じる ▲'}</div>` : ''}
    </div>`;
  });
  wrap.innerHTML = html;
  if(isAdmin()) document.getElementById('newBoardBtn').addEventListener('click', ()=> openBoardEdit(null));
  wrap.querySelectorAll('[data-bact]').forEach(el=> el.addEventListener('click', ()=>{
    const bid = el.dataset.bid; const act = el.dataset.bact;
    if(act==='toggle'){ expandedBoardIds.has(bid) ? expandedBoardIds.delete(bid) : expandedBoardIds.add(bid); renderBoard(); }
    else if(act==='edit'){ openBoardEdit(bid); }
    else if(act==='del'){ deleteBoardPost(bid); }
  }));
}
async function deleteBoardPost(bid){
  config.board = config.board.filter(p=>p.id!==bid);
  await saveConfig(); renderBoard(); showToast('削除しました');
}
function openBoardEdit(bid){
  editingBoardId = bid;
  const post = bid ? config.board.find(p=>p.id===bid) : null;
  document.getElementById('boardEditTitle').textContent = bid ? '投稿を編集' : '掲示板に投稿';
  document.getElementById('boardText').value = post ? post.text : '';
  const modal = document.getElementById('boardEditModal');
  modal.dataset.color = post ? (post.color||'#182A32') : '#182A32';
  modal.dataset.bg = post ? (post.bg||'#FFF8E6') : '#FFF8E6';
  modal.dataset.align = post ? (post.align||'left') : 'left';
  modal.dataset.mode = post ? (post.mode||'full') : 'full';
  renderBoardColorRow();
  document.querySelectorAll('#boardEditModal [data-align]').forEach(b=> b.classList.toggle('active', b.dataset.align===modal.dataset.align));
  document.querySelectorAll('#boardEditModal [data-mode]').forEach(b=> b.classList.toggle('active', b.dataset.mode===modal.dataset.mode));
  modal.classList.remove('hidden');
}
function renderBoardColorRow(){
  const modal = document.getElementById('boardEditModal');
  const TEXT_COLORS = ['#182A32','#1F4E5F','#33907B','#D1543D','#8E5FB0','#B0784B'];
  document.getElementById('boardColorRow').innerHTML = TEXT_COLORS.map(c=>`<span class="swatch ${c===modal.dataset.color?'active':''}" style="background:${c}" data-c="${c}"></span>`).join('');
  document.querySelectorAll('#boardColorRow .swatch').forEach(sw=> sw.addEventListener('click', ()=>{
    modal.dataset.color = sw.dataset.c;
    document.querySelectorAll('#boardColorRow .swatch').forEach(s=>s.classList.toggle('active', s.dataset.c===modal.dataset.color));
  }));
}
document.querySelectorAll('#boardEditModal [data-align]').forEach(b=> b.addEventListener('click', ()=>{
  const modal = document.getElementById('boardEditModal'); modal.dataset.align = b.dataset.align;
  document.querySelectorAll('#boardEditModal [data-align]').forEach(x=>x.classList.toggle('active', x===b));
}));
document.querySelectorAll('#boardEditModal [data-mode]').forEach(b=> b.addEventListener('click', ()=>{
  const modal = document.getElementById('boardEditModal'); modal.dataset.mode = b.dataset.mode;
  document.querySelectorAll('#boardEditModal [data-mode]').forEach(x=>x.classList.toggle('active', x===b));
}));
document.getElementById('saveBoardBtn').addEventListener('click', async ()=>{
  const modal = document.getElementById('boardEditModal');
  const text = document.getElementById('boardText').value.trim();
  if(!text){ showToast('内容を入力してください'); return; }
  if(editingBoardId){
    const p = config.board.find(x=>x.id===editingBoardId);
    p.text = text; p.color = modal.dataset.color; p.align = modal.dataset.align; p.mode = modal.dataset.mode;
  }else{
    config.board.push({id:uid(), text, color:modal.dataset.color, bg:modal.dataset.bg, align:modal.dataset.align, mode:modal.dataset.mode, createdAt:Date.now()});
  }
  await saveConfig();
  modal.classList.add('hidden'); renderBoard(); showToast('投稿しました');
});

/* ---------- today strip ---------- */
function renderToday(){
  const t = todayStr(); const today = new Date();
  const label = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日（${wd(today)}）`;
  const todays = eventsOnDateClub(t);
  let html = `<div class="lbl">本日・${esc((clubById(currentClubId)||{}).name||'')}</div><div class="date">${label}</div>`;
  if(todays.length===0){ html += `<div class="empty-note">本日の予定はまだありません</div>`; }
  else{
    todays.forEach(e=>{
      const mine = myStaffId() && e.confirmedIds && e.confirmedIds.includes(myStaffId());
      const need = requiredFor(e.clubId);
      const cnt = e.status==='confirmed' ? (e.confirmedIds||[]).length : respsForEvent(e.id).length;
      const short = cnt < need;
      html += `<div style="display:flex; align-items:center; gap:8px; padding:6px 0; border-top:1px solid var(--line);">
        <div style="flex:1; font-size:12.5px; font-weight:700;">${esc(timeLabel(e))}${mine?'<span class="mine-badge">あなたが担当</span>':''}${short?'<span class="short-badge">人数不足</span>':''}</div>
        <span class="badge ${e.status}">${e.status==='confirmed'?'確定':'候補'}</span>
      </div>`;
    });
  }
  document.getElementById('todayStrip').innerHTML = html;
}

/* ---------- month view ---------- */
function getMonthMatrix(year, month){
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const cells = [];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);
  while(cells.length % 7 !== 0) cells.push(null);
  return cells;
}
function renderMonth(){
  document.getElementById('monthTitle').textContent = `${currentYear}年 ${currentMonth+1}月`;
  const cells = getMonthMatrix(currentYear, currentMonth); const t = todayStr();
  let html = '';
  cells.forEach(d=>{
    if(d===null){ html += `<div class="daycell empty"></div>`; return; }
    const date = dstr(currentYear, currentMonth, d);
    const isToday = date===t;
    const dayEvents = eventsOnDateClub(date);
    let pills = '';
    dayEvents.slice(0,3).forEach((e,idx)=>{
      const need = requiredFor(e.clubId);
      const cnt = e.status==='confirmed' ? (e.confirmedIds||[]).length : respsForEvent(e.id).length;
      const short = cnt < need;
      const label = e.status==='confirmed'
        ? (e.confirmedIds||[]).map(id=>{const s=staffById(id); return s?s.name.slice(0,2):'';}).join('・') || '確定'
        : `候補`;
      const bg = short ? 'var(--coral)' : (e.color || PALETTE[idx % PALETTE.length]);
      pills += `<div class="mini-pill" style="background:${bg};">${esc(timeLabel(e).slice(0,5))}:${esc(label)}</div>`;
    });
    html += `<div class="daycell ${isToday?'today':''}" data-date="${date}"><div class="daynum">${d}</div>${pills}</div>`;
  });
  document.getElementById('monthGrid').innerHTML = html;
  document.querySelectorAll('.daycell[data-date]').forEach(el=> el.addEventListener('click', ()=>openDayModal(el.dataset.date)));
}

/* ---------- year view ---------- */
function renderYear(){
  document.getElementById('yearTitle').textContent = `${yearViewYear}年`;
  let html = '';
  for(let m=0;m<12;m++){
    const cells = getMonthMatrix(yearViewYear, m);
    let g = '';
    cells.forEach(d=>{
      if(d===null){ g += `<div class="ycell"></div>`; return; }
      const date = dstr(yearViewYear, m, d);
      const dayEvents = eventsOnDateClub(date);
      let dots = '';
      dayEvents.slice(0,3).forEach(e=>{
        const need = requiredFor(e.clubId);
        const cnt = e.status==='confirmed' ? (e.confirmedIds||[]).length : respsForEvent(e.id).length;
        const c = cnt<need ? 'var(--coral)' : (e.status==='confirmed'?'var(--teal)':'var(--amber)');
        dots += `<span style="background:${c}"></span>`;
      });
      g += `<div class="ycell" data-date="${date}" data-m="${m}">${d}<div class="ydots">${dots}</div></div>`;
    });
    html += `<div class="ymonth"><h4 data-m="${m}">${m+1}月</h4><div class="ygrid">${g}</div></div>`;
  }
  document.getElementById('yearGrid').innerHTML = html;
  document.querySelectorAll('.ymonth h4').forEach(el=> el.addEventListener('click', ()=>{ currentMonth=parseInt(el.dataset.m); currentYear=yearViewYear; switchTab('month'); renderMonth(); }));
  document.querySelectorAll('.ycell[data-date]').forEach(el=> el.addEventListener('click', ()=>{
    currentMonth=parseInt(el.dataset.m); currentYear=yearViewYear; switchTab('month'); renderMonth();
    setTimeout(()=>openDayModal(el.dataset.date), 60);
  }));
}

/* ---------- compare view ---------- */
function openCompare(){
  const sportName = SPORTS.find(s=>s.id===currentSport).name;
  document.getElementById('compareTitle').textContent = `${sportName}のクラブ比較`;
  const list = clubsBySport(currentSport);
  const todayD = todayStr();
  let html = '';
  list.forEach(c=>{
    const clubEvents = events.filter(e=>e.clubId===c.id);
    const monthEvents = clubEvents.filter(e=>{ const d=new Date(e.date+'T00:00:00'); return d.getFullYear()===currentYear && d.getMonth()===currentMonth; });
    const openCount = monthEvents.filter(e=>e.status==='open').length;
    const confirmedCount = monthEvents.filter(e=>e.status==='confirmed').length;
    const shortCount = monthEvents.filter(e=>{ const cnt = e.status==='confirmed'?(e.confirmedIds||[]).length:respsForEvent(e.id).length; return cnt < requiredFor(c.id); }).length;
    const upcoming = clubEvents.filter(e=>e.date>=todayD).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,3);
    html += `<div class="compare-card">
      <h4>${esc(c.name)}</h4>
      <div class="compare-stats">
        <span style="background:var(--amber-soft); color:var(--amber);">候補${openCount}</span>
        <span style="background:var(--teal-soft); color:var(--teal);">確定${confirmedCount}</span>
        <span style="background:var(--coral-soft); color:var(--coral);">不足${shortCount}</span>
      </div>
      <div class="compare-upcoming">
        ${upcoming.length ? upcoming.map(e=>{
          const d = new Date(e.date+'T00:00:00');
          return `<div><span class="dot ${e.status}"></span>${d.getMonth()+1}/${d.getDate()}（${wd(d)}）${esc(timeLabel(e))}</div>`;
        }).join('') : '<div class="empty-note">直近の予定なし</div>'}
      </div>
      <button class="btn outline block" style="margin-top:8px;" data-goclub="${c.id}">このクラブを見る</button>
    </div>`;
  });
  document.getElementById('compareBody').innerHTML = html;
  document.querySelectorAll('#compareBody [data-goclub]').forEach(b=> b.addEventListener('click', ()=>{
    currentClubId = b.dataset.goclub; renderClubRow(); renderMonth(); renderToday();
    document.getElementById('compareModal').classList.add('hidden');
  }));
  document.getElementById('compareModal').classList.remove('hidden');
}
document.getElementById('compareLink').addEventListener('click', openCompare);

/* ---------- day modal ---------- */
function openDayModal(date){
  activeDayDate = date;
  const d = new Date(date+'T00:00:00');
  const club = clubById(currentClubId);
  document.getElementById('dayModalTitle').textContent = `${d.getMonth()+1}月${d.getDate()}日（${wd(d)}）`;
  document.getElementById('dayModalSub').textContent = club ? club.name : '';
  renderDayModalBody();
  renderNewEventArea();
  document.getElementById('dayModal').classList.remove('hidden');
}
function staffOptionsHtml(excludeIds){
  excludeIds = excludeIds || [];
  return config.staff.filter(s=>!excludeIds.includes(s.id)).map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
}
function renderDayModalBody(){
  const dayEvents = eventsOnDateClub(activeDayDate);
  if(dayEvents.length===0){
    document.getElementById('dayModalBody').innerHTML = `<div class="empty-note">この日の予定はまだありません。</div>`;
    return;
  }
  let html = '';
  dayEvents.forEach((e,idx)=>{
    const resps = respsForEvent(e.id);
    const mySid = myStaffId();
    const myResp = myResponse(e.id);
    const color = e.color || PALETTE[idx % PALETTE.length];
    const need = requiredFor(e.clubId);
    const curCount = e.status==='confirmed' ? (e.confirmedIds||[]).length : resps.length;
    const short = curCount < need;
    const canRespond = isAdmin() || (mySid && (myClubIds().includes(e.clubId)));

    html += `<div class="event-card" data-ev="${e.id}" style="--ev-color:${color};">
      ${dayEvents.length>1 ? `<div class="ev-num">候補${idx+1}</div>` : ''}
      <div class="ev-top">
        <div>
          <div class="ev-time">🕐 ${esc(timeLabel(e))}</div>
        </div>
        <div style="text-align:right;">
          <span class="badge ${e.status}">${e.status==='confirmed'?'確定':'候補'}</span>
          ${isAdmin() ? `<div class="ev-admin-btns" style="margin-top:6px;">
            <button class="icon-sm" data-act="editEv" data-ev="${e.id}">✎</button>
            <button class="icon-sm" data-act="delEv" data-ev="${e.id}">🗑</button>
          </div>` : ''}
        </div>
      </div>
      ${e.note ? `<div class="ev-note">${esc(e.note)}</div>` : ''}
      <div id="editArea-${e.id}"></div>`;

    if(short){
      const sugg = crossClubCandidates(e.clubId, resps.map(r=>r.staffId)).slice(0,6);
      html += `<div class="warn">必要人数（${need}人）に対して現在${curCount}人です。
        ${sugg.length ? `<div class="sugg">${sugg.map(s=>`<button class="sugg-chip" data-act="crossAdd" data-ev="${e.id}" data-staff="${s.id}">${esc(s.name)}に依頼して追加</button>`).join('')}</div>` : ''}
      </div>`;
    }

    html += `<div class="sec-label">指導できる人</div><div class="resp-row">`;
    resps.forEach(r=>{
      const st = staffById(r.staffId); if(!st) return;
      const isConfirmed = e.status==='confirmed' && (e.confirmedIds||[]).includes(r.staffId);
      const timeTxt = (!e.timeStart && r.timeStart) ? ` (${r.timeStart}-${r.timeEnd})` : '';
      const canRemove = isAdmin() || (r.staffId===mySid && e.status!=='confirmed');
      html += `<span class="resp-chip ${r.staffId===mySid?'mine':''} ${isConfirmed?'confirmed-pick':''}">${esc(st.name)}${timeTxt}
        ${canRemove ? `<button data-act="rmResp" data-resp="${r.id}" data-ev="${e.id}">×</button>` : ''}
      </span>`;
    });
    if(resps.length===0) html += `<span class="empty-note">まだ登録がありません</span>`;
    html += `</div>`;

    /* instructor self-registration */
    if(!isAdmin() && mySid){
      if(!canRespond){
        html += `<div class="empty-note">このクラブには対応登録されていません（設定から追加できます）</div>`;
      }else if(e.status==='confirmed'){
        if((e.confirmedIds||[]).includes(mySid)) html += `<div class="empty-note" style="color:var(--teal); font-weight:700;">あなたが担当として確定しています</div>`;
      }else if(!myResp){
        if(e.timeStart){
          html += `<button class="btn primary" data-act="quickResp" data-ev="${e.id}">私は指導できます</button>`;
        }else{
          html += `<div class="two-col">
            <input type="time" id="myStart-${e.id}">
            <input type="time" id="myEnd-${e.id}">
          </div>
          <button class="btn primary" style="margin-top:6px;" data-act="timeResp" data-ev="${e.id}">この時間で登録する</button>`;
        }
      }
    }

    /* admin controls */
    if(isAdmin()){
      html += `<div class="divider"></div><div class="sec-label">担当を確定する</div>
        <div class="resp-row" data-pickzone="${e.id}">`;
      resps.forEach(r=>{
        const st = staffById(r.staffId); if(!st) return;
        const picked = (e.confirmedIds||[]).includes(r.staffId);
        html += `<button class="resp-chip ${picked?'confirmed-pick':''}" data-act="togglePick" data-ev="${e.id}" data-staff="${r.staffId}" type="button">${esc(st.name)}</button>`;
      });
      html += `</div>
        <div class="row-gap">
          <button class="btn primary" data-act="confirmEv" data-ev="${e.id}">${e.status==='confirmed'?'確定内容を更新':'この内容で確定する'}</button>
          ${e.status==='confirmed' ? `<button class="btn ghost" data-act="reopenEv" data-ev="${e.id}">候補に戻す</button>` : ''}
        </div>
        <div class="sec-label" style="margin-top:10px;">他のスタッフを登録に追加</div>
        <div class="inline-form">
          <select id="addRespSel-${e.id}">${staffOptionsHtml(resps.map(r=>r.staffId))}</select>
          <button class="btn outline" data-act="adminAddResp" data-ev="${e.id}">追加</button>
        </div>`;
    }
    html += `</div>`;
  });
  document.getElementById('dayModalBody').innerHTML = html;
  document.querySelectorAll('#dayModalBody [data-act]').forEach(el=> el.addEventListener('click', onDayAction));
}
function renderNewEventArea(){

    area.dataset.color = sw.dataset.c;

  if(templates.length) document.getElementById('useTemplateBtn').addEventListener('click', useTemplate);

}async function addNewEvent(){
  const noTime = document.getElementById('nvNoTime').checked;
  const timeStart = noTime ? null : (document.getElementById('nvStart').value || null);
  const timeEnd = noTime ? null : (document.getElementById('nvEnd').value || null);

function copyDayEvents(){

async function saveAsTemplate(){

async function useTemplate(){
  const tid = document.getElementById('templateSel').value;
  const t = (config.templates||[]).find(x=>x.id===tid); if(!t) return;
  t.items.forEach(it=>{
    events.push({id:uid(), clubId:currentClubId, date:activeDayDate, timeStart:it.timeStart, timeEnd:it.timeEnd, note:it.note, color:it.color, status:'open', confirmedIds:[], createdAt:Date.now()});
  });
  await saveEvents();
  renderDayModalBody(); renderNewEventArea(); renderMonth(); renderToday();
  showToast('テンプレから追加しました');
}
async function onDayAction(e){
  const el = e.currentTarget; const act = el.dataset.act; const evId = el.dataset.ev;
  const ev = events.find(x=>x.id===evId); if(!ev && act!=='rmResp') return;
  const mySid = myStaffId();
  if(act==='quickResp'){
    responses.push({id:uid(), eventId:evId, staffId:mySid, timeStart:null, timeEnd:null, createdAt:Date.now()});
    await saveResponses(); showToast('登録しました');
  }else if(act==='timeResp'){
    const s = document.getElementById('myStart-'+evId).value, en = document.getElementById('myEnd-'+evId).value;
    if(!s || !en){ showToast('時間を入力してください'); return; }
    responses.push({id:uid(), eventId:evId, staffId:mySid, timeStart:s, timeEnd:en, createdAt:Date.now()});
    await saveResponses(); showToast('登録しました');
  }else if(act==='rmResp'){
    const rId = el.dataset.resp;
    responses = responses.filter(r=>r.id!==rId);
    await saveResponses(); showToast('取り消しました');
  }else if(act==='togglePick'){
    const sid = el.dataset.staff;
    ev.confirmedIds = ev.confirmedIds || [];
    if(ev.confirmedIds.includes(sid)) ev.confirmedIds = ev.confirmedIds.filter(x=>x!==sid);
    else ev.confirmedIds.push(sid);
    await saveEvents();
  }else if(act==='confirmEv'){
    if(!ev.confirmedIds || ev.confirmedIds.length===0){ showToast('担当を1人以上選んでください'); return; }
    ev.status = 'confirmed';
    await saveEvents(); showToast('確定しました');
  }else if(act==='reopenEv'){
    ev.status = 'open';
    await saveEvents(); showToast('候補に戻しました');
  }else if(act==='adminAddResp'){
    const sel = document.getElementById('addRespSel-'+evId);
    const sid = sel.value; if(!sid) return;
    responses.push({id:uid(), eventId:evId, staffId:sid, timeStart:null, timeEnd:null, createdAt:Date.now()});
    await saveResponses(); showToast('追加しました');
  }else if(act==='crossAdd'){
    const sid = el.dataset.staff;
    responses.push({id:uid(), eventId:evId, staffId:sid, timeStart:null, timeEnd:null, createdAt:Date.now()});
    ev.confirmedIds = ev.confirmedIds || [];
    if(!ev.confirmedIds.includes(sid) && ev.status==='confirmed') ev.confirmedIds.push(sid);
    await saveResponses(); await saveEvents(); showToast('追加しました');
  }else if(act==='delEv'){
    events = events.filter(x=>x.id!==evId);
    responses = responses.filter(r=>r.eventId!==evId);
    await saveEvents(); await saveResponses(); showToast('削除しました');
  }else if(act==='editEv'){
    toggleEditForm(evId); return;
  }
  renderDayModalBody(); renderNewEventArea(); renderMonth(); renderToday();
}
function toggleEditForm(evId){
  const ev = events.find(x=>x.id===evId); if(!ev) return;
  const area = document.getElementById('editArea-'+evId);
  if(area.innerHTML){ area.innerHTML=''; return; }
  area.innerHTML = `
    <div class="new-ev-form">
      <div class="two-col">
        <div class="field"><label>開始</label><input type="time" id="edStart-${evId}" value="${ev.timeStart||''}"></div>
        <div class="field"><label>終了</label><input type="time" id="edEnd-${evId}" value="${ev.timeEnd||''}"></div>
      </div>
      <div class="field"><label>メモ</label><input type="text" id="edNote-${evId}" value="${esc(ev.note||'')}"></div>
      <div class="field"><label>色</label><div class="color-swatches" id="edColorRow-${evId}"></div></div>
      <button class="btn primary block" id="saveEd-${evId}">保存する</button>
    </div>`;
  const edArea = document.getElementById('editArea-'+evId);
  edArea.dataset.color = ev.color || PALETTE[0];
  document.getElementById('edColorRow-'+evId).innerHTML = PALETTE.map(c=>`<span class="swatch ${c===edArea.dataset.color?'active':''}" style="background:${c}" data-c="${c}"></span>`).join('');
  edArea.querySelectorAll('.swatch').forEach(sw=> sw.addEventListener('click', ()=>{
    edArea.dataset.color = sw.dataset.c;
    edArea.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active', s.dataset.c===edArea.dataset.color));
  }));
  document.getElementById('saveEd-'+evId).addEventListener('click', async ()=>{
    ev.timeStart = document.getElementById('edStart-'+evId).value || null;
    ev.timeEnd = document.getElementById('edEnd-'+evId).value || null;
    ev.note = document.getElementById('edNote-'+evId).value.trim();
    ev.color = edArea.dataset.color;
    await saveEvents();
    renderDayModalBody(); renderMonth(); renderToday();
    showToast('変更しました');
  });
}

function renderStaffModal(){
  renderDisplaySettings();
  document.getElementById('staffList').innerHTML = config.staff.map(s=>{
    const canEditClubs = isAdmin() || s.id===myStaffId();
    const clubNames = (s.clubIds||[]).map(id=>{const c=clubById(id); return c?c.name.replace(/中学校/,''):'';}).join('、') || '未登録';
    return `<div class="staff-row">
      <span class="cdot" style="background:${s.color}"></span><span class="nm">${esc(s.name)}<br><span style="font-size:10.5px; color:var(--ink-soft); font-weight:600;">対応: ${esc(clubNames)}</span></span>
      ${canEditClubs ? `<button class="small-btn" data-act="editclubs" data-id="${s.id}">クラブ編集</button>` : ''}
      ${isAdmin() ? `<button class="small-btn danger" data-act="delstaff" data-id="${s.id}">削除</button>` : ''}
      <div class="club-check-panel hidden" id="clubPanel-${s.id}"></div>
    </div>`;
  }).join('') || '<div class="empty-note">スタッフが登録されていません</div>';
  document.querySelectorAll('#staffList [data-act="delstaff"]').forEach(el=> el.addEventListener('click', async ()=>{
    const id = el.dataset.id;
    config.staff = config.staff.filter(s=>s.id!==id);
    events.forEach(e=>{ if(e.confirmedIds) e.confirmedIds = e.confirmedIds.filter(x=>x!==id); });
    responses = responses.filter(r=>r.staffId!==id);
    await saveConfig(); await saveEvents(); await saveResponses();
    renderStaffModal(); renderMonth(); renderToday();
  }));
  document.querySelectorAll('#staffList [data-act="editclubs"]').forEach(el=> el.addEventListener('click', ()=> toggleClubPanel(el.dataset.id)));
}
function toggleClubPanel(staffId){
  const panel = document.getElementById('clubPanel-'+staffId);
  if(!panel.classList.contains('hidden')){ panel.classList.add('hidden'); panel.innerHTML=''; return; }
  const st = staffById(staffId); if(!st) return;
  if(!st.clubIds) st.clubIds = [];
  let html = '';
  SPORTS.forEach(sp=>{
    html += `<div class="sport-group-label">${esc(sp.name)}</div>`;
    clubsBySport(sp.id).forEach(c=>{
      const checked = st.clubIds.includes(c.id);
      html += `<div class="club-check-row"><input type="checkbox" data-cid="${c.id}" data-sid="${staffId}" ${checked?'checked':''}> <label>${esc(c.name)}</label></div>`;
    });
  });
  panel.innerHTML = html;
  panel.classList.remove('hidden');
  panel.querySelectorAll('input[type=checkbox]').forEach(cb=> cb.addEventListener('change', async ()=>{
    const s = staffById(cb.dataset.sid);
    if(!s.clubIds) s.clubIds = [];
    if(cb.checked){ if(!s.clubIds.includes(cb.dataset.cid)) s.clubIds.push(cb.dataset.cid); }
    else{ s.clubIds = s.clubIds.filter(x=>x!==cb.dataset.cid); }
    await saveConfig();
    renderStaffModal();
    showToast('更新しました');
  }));
}

/* ---------- export ---------- */
function getConfirmedForMonthClub(y,m){
  return events.filter(e=>{ const d=new Date(e.date+'T00:00:00'); return e.status==='confirmed' && e.clubId===currentClubId && d.getFullYear()===y && d.getMonth()===m; })
    .sort((a,b)=>a.date.localeCompare(b.date));
}
function memberLabel(e){
  return (e.confirmedIds||[]).map(id=>{
    const st = staffById(id); if(!st) return '';
    if(!e.timeStart){
      const r = responses.find(x=>x.eventId===e.id && x.staffId===id);
      if(r && r.timeStart) return `${st.name}(${r.timeStart}-${r.timeEnd})`;
    }
    return st.name;
  }).filter(Boolean).join('、') || '（担当未設定）';
}
function buildRows(){
  return getConfirmedForMonthClub(currentYear, currentMonth).map(e=>{
    const d = new Date(e.date+'T00:00:00');
    return [`${d.getMonth()+1}/${d.getDate()}`, wd(d), timeLabel(e), memberLabel(e), e.note||''];
  });
}
document.getElementById('exportBtn').addEventListener('click', ()=> document.getElementById('exportModal').classList.remove('hidden'));
document.getElementById('expExcel').addEventListener('click', ()=>{
  const rows = buildRows();
  if(rows.length===0){ showToast('確定した予定がありません'); return; }
  const clubName = (clubById(currentClubId)||{}).name || '';
  const aoa = [[clubName], ['日付','曜日','時間','担当','メモ'], ...rows];
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `${currentMonth+1}月`);
  XLSX.writeFile(wb, `月間予定_${currentYear}_${currentMonth+1}.xlsx`);
  document.getElementById('exportModal').classList.add('hidden');
});
document.getElementById('expWord').addEventListener('click', ()=>{
  const rows = buildRows();
  if(rows.length===0){ showToast('確定した予定がありません'); return; }
  const clubName = (clubById(currentClubId)||{}).name || '';
  const trs = rows.map(r=>`<tr>${r.map(c=>`<td>${esc(String(c))}</td>`).join('')}</tr>`).join('');
  const html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
    <head><meta charset="utf-8"><title>月間予定</title></head>
    <body style="font-family:'MS PGothic',sans-serif;">
      <h2>${esc(clubName)}　${currentYear}年${currentMonth+1}月 月間予定（確定分）</h2>
      <table border="1" cellspacing="0" cellpadding="5" style="border-collapse:collapse; font-size:11pt;">
        <tr>${['日付','曜日','時間','担当','メモ'].map(h=>`<th>${h}</th>`).join('')}</tr>
        ${trs}
      </table>
    </body></html>`;
  const blob = new Blob(['\ufeff', html], {type:'application/msword'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = `月間予定_${currentYear}_${currentMonth+1}.doc`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  document.getElementById('exportModal').classList.add('hidden');
});
document.getElementById('expPdf').addEventListener('click', ()=>{
  const rows = buildRows();
  if(rows.length===0){ showToast('確定した予定がありません'); return; }
  const clubName = (clubById(currentClubId)||{}).name || '';
  const trs = rows.map(r=>`<tr>${r.map(c=>`<td>${esc(String(c))}</td>`).join('')}</tr>`).join('');

});

  if(tab==='year') renderYear();
}
document.querySelectorAll('.tab').forEach(t=> t.addEventListener('click', ()=>switchTab(t.dataset.tab)));
document.getElementById('prevMonth').addEventListener('click', ()=>{ currentMonth--; if(currentMonth<0){currentMonth=11; currentYear--;} renderMonth(); });
document.getElementById('nextMonth').addEventListener('click', ()=>{ currentMonth++; if(currentMonth>11){currentMonth=0; currentYear++;} renderMonth(); });
document.getElementById('prevYear').addEventListener('click', ()=>{ yearViewYear--; renderYear(); });
document.getElementById('nextYear').addEventListener('click', ()=>{ yearViewYear++; renderYear(); });
document.querySelectorAll('[data-close]').forEach(el=> el.addEventListener('click', ()=> document.getElementById(el.dataset.close).classList.add('hidden')));
document.querySelectorAll('.overlay').forEach(ov=> ov.addEventListener('click', e=>{ if(e.target===ov) ov.classList.add('hidden'); }));

/* ---------- realtime polling ---------- */
async function pollRefresh(){
  if(document.hidden) return;
  await loadShared();
  const dayModalEl = document.getElementById('dayModal');
  const dayModalOpen = !dayModalEl.classList.contains('hidden');
  if(dayModalOpen && !isModalInputFocused(dayModalEl)){ renderDayModalBody(); renderNewEventArea(); }
  renderBoard(); renderMonth(); renderToday();
  if(!document.getElementById('yearView').classList.contains('hidden')) renderYear();
}
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) pollRefresh(); });

/* ---------- init ---------- */
async function init(){
  await loadIdentity();
  await loadShared();
  ensureCurrentClub();
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('mainContent').classList.remove('hidden');
  updateRoleBtn();
  renderBoard(); renderSportRow(); renderClubRow(); renderToday(); renderMonth();
  if(!identity){ renderIdentityModal(); document.getElementById('identityModal').classList.remove('hidden'); }
  pollTimer = setInterval(pollRefresh, 5000);
}
init();
</script>
</body>
</html>
